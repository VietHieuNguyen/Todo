services:
  mongodb:
    image: mongo:latest
    container_name: todo-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: todo-backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/todo-app
      - PORT=3000
    depends_on:
      - mongodb

  frontend:
    build: ./frontend/react
    container_name: todo-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
